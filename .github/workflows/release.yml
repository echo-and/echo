name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            exe: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            exe: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            exe: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            exe: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            gcc \
            g++ \
            gettext-base \
            git \
            jq \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfontconfig-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxdo-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            lld \
            llvm \
            make \
            pkg-config

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          artifact="echo-${tag}-${{ matrix.target }}"
          package_dir="dist/${artifact}"
          mkdir -p "${package_dir}"
          cp "target/${{ matrix.target }}/release/echo${{ matrix.exe }}" "${package_dir}/"
          cp README.md LICENSE CHANGELOG.md "${package_dir}/"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && 7z a "${artifact}.zip" "${artifact}")
          else
            tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/echo-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
