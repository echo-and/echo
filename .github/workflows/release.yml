name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            exe: ""
            rustflags: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            exe: ""
            rustflags: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: AppImage
            exe: ""
            rustflags: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            exe: ".exe"
            rustflags: "-C target-feature=+crt-static"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            curl \
            gcc \
            g++ \
            gettext-base \
            git \
            imagemagick \
            jq \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfontconfig-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            lld \
            llvm \
            make \
            pkg-config \
            xvfb

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Check Windows runtime dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/echo${{ matrix.exe }}"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "Visual Studio Build Tools were not found"
          }

          $vcvars = Join-Path $vsPath "VC\Auxiliary\Build\vcvars64.bat"
          $dump = cmd /c "`"$vcvars`" >nul && dumpbin /dependents `"$exe`""
          $dump | Write-Output

          if ($dump -match "VCRUNTIME|MSVCP|api-ms-win-crt|ucrtbase") {
            throw "Windows release binary dynamically depends on the Visual C++ Runtime"
          }

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          artifact="echo-${tag}-${{ matrix.target }}"
          package_dir="dist/${artifact}"
          mkdir -p "${package_dir}"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            app_dir="${package_dir}/Echo.app"
            mkdir -p "${app_dir}/Contents/MacOS" "${app_dir}/Contents/Resources"
            cp "target/${{ matrix.target }}/release/echo" "${app_dir}/Contents/MacOS/Echo"
            chmod +x "${app_dir}/Contents/MacOS/Echo"
            iconset_dir="$(mktemp -d)"
            mkdir -p "${iconset_dir}/echo.iconset"
            sips -z 16 16 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_16x16.png" >/dev/null
            sips -z 32 32 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_16x16@2x.png" >/dev/null
            sips -z 32 32 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_32x32.png" >/dev/null
            sips -z 64 64 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_32x32@2x.png" >/dev/null
            sips -z 128 128 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_128x128.png" >/dev/null
            sips -z 256 256 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_128x128@2x.png" >/dev/null
            sips -z 256 256 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_256x256.png" >/dev/null
            sips -z 512 512 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_256x256@2x.png" >/dev/null
            sips -z 512 512 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_512x512.png" >/dev/null
            sips -z 1024 1024 assets/images/macos-icon.png --out "${iconset_dir}/echo.iconset/icon_512x512@2x.png" >/dev/null
            iconutil -c icns "${iconset_dir}/echo.iconset" -o "${app_dir}/Contents/Resources/Echo.icns"
            rm -rf "${iconset_dir}"
            {
              printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>'
              printf '%s\n' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">'
              printf '%s\n' '<plist version="1.0">'
              printf '%s\n' '<dict>'
              printf '%s\n' '  <key>CFBundleDevelopmentRegion</key>'
              printf '%s\n' '  <string>en</string>'
              printf '%s\n' '  <key>CFBundleDisplayName</key>'
              printf '%s\n' '  <string>Echo</string>'
              printf '%s\n' '  <key>CFBundleExecutable</key>'
              printf '%s\n' '  <string>Echo</string>'
              printf '%s\n' '  <key>CFBundleIconFile</key>'
              printf '%s\n' '  <string>Echo.icns</string>'
              printf '%s\n' '  <key>CFBundleIdentifier</key>'
              printf '%s\n' '  <string>and.echo.echo</string>'
              printf '%s\n' '  <key>CFBundleName</key>'
              printf '%s\n' '  <string>Echo</string>'
              printf '%s\n' '  <key>CFBundlePackageType</key>'
              printf '%s\n' '  <string>APPL</string>'
              printf '%s\n' '  <key>CFBundleShortVersionString</key>'
              printf '%s\n' "  <string>${version}</string>"
              printf '%s\n' '  <key>CFBundleVersion</key>'
              printf '%s\n' "  <string>${version}</string>"
              printf '%s\n' '  <key>LSApplicationCategoryType</key>'
              printf '%s\n' '  <string>public.app-category.developer-tools</string>'
              printf '%s\n' '  <key>NSHighResolutionCapable</key>'
              printf '%s\n' '  <true/>'
              printf '%s\n' '</dict>'
              printf '%s\n' '</plist>'
            } > "${app_dir}/Contents/Info.plist"
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            app_dir="${package_dir}.AppDir"
            tools_dir="$(mktemp -d)"
            linuxdeploy="${tools_dir}/linuxdeploy-x86_64.AppImage"
            icon_file="${tools_dir}/echo.png"

            mkdir -p "${app_dir}/usr/bin" \
              "${app_dir}/usr/share/applications" \
              "${app_dir}/usr/share/icons/hicolor/512x512/apps" \
              "${app_dir}/usr/share/doc/echo"
            cp "target/${{ matrix.target }}/release/echo" "${app_dir}/usr/bin/echo"
            chmod +x "${app_dir}/usr/bin/echo"
            cp assets/linux/echo.desktop "${app_dir}/usr/share/applications/echo.desktop"
            convert assets/images/Icon.png -resize 512x512 "${icon_file}"
            cp "${icon_file}" "${app_dir}/usr/share/icons/hicolor/512x512/apps/echo.png"
            cp README.md LICENSE CHANGELOG.md "${app_dir}/usr/share/doc/echo/"

            curl -fsSL \
              -o "${linuxdeploy}" \
              "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
            chmod +x "${linuxdeploy}"

            export APPIMAGE_EXTRACT_AND_RUN=1
            export OUTPUT="${artifact}.AppImage"
            "${linuxdeploy}" \
              --appdir "${app_dir}" \
              --executable "${app_dir}/usr/bin/echo" \
              --desktop-file assets/linux/echo.desktop \
              --icon-file "${icon_file}" \
              --output appimage
            mv "${artifact}.AppImage" "dist/${artifact}.AppImage"
            rm -rf "${tools_dir}"
          else
            cp "target/${{ matrix.target }}/release/echo${{ matrix.exe }}" "${package_dir}/"
            cp assets/images/app-icon.ico "${package_dir}/"
          fi

          if [[ "${{ runner.os }}" != "Linux" ]]; then
            cp README.md LICENSE CHANGELOG.md "${package_dir}/"
          fi

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && 7z a "${artifact}.zip" "${artifact}")
          elif [[ "${{ matrix.archive }}" == "AppImage" ]]; then
            chmod +x "dist/${artifact}.AppImage"
          else
            tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
          fi

      - name: Smoke test Linux package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          artifact="echo-${tag}-${{ matrix.target }}"
          exe="dist/${artifact}.AppImage"
          smoke_log="$(mktemp)"

          set +e
          APPIMAGE_EXTRACT_AND_RUN=1 timeout 8s xvfb-run -a "${exe}" >"${smoke_log}" 2>&1
          status=$?
          set -e

          cat "${smoke_log}"
          if [[ "${status}" -ne 0 && "${status}" -ne 124 ]]; then
            exit "${status}"
          fi

          if grep -E "panicked|GTK has not been initialized" "${smoke_log}"; then
            exit 1
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/echo-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
